name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build + Integration + Smoke
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData and SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-${{ hashFiles('project.yml', 'Packages/ClearlyCore/Package.swift', 'Packages/ClearlyCore/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build ClearlyCLI (Debug)
        run: xcodebuild -scheme ClearlyCLI -configuration Debug build -quiet

      - name: Integration tests
        run: |
          xcodebuild test \
            -scheme ClearlyCLIIntegrationTests \
            -destination 'platform=macOS' \
            -quiet

      - name: CLI smoke test
        run: ./scripts/cli-smoke.sh
